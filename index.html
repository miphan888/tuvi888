<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               script-src 'self' 'unsafe-inline' 'unsafe-eval'; 
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
               font-src 'self' https://fonts.gstatic.com; 
               connect-src 'self' https://generativelanguage.googleapis.com; 
               img-src 'self' data:;"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lịch Việt Nam 888 - Tra cứu lịch âm, tử vi, tứ trụ, phong thủy và văn khấn truyền thống Việt Nam" />
  <title>Lịch Việt Nam 888 🌸</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- CSS Core -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- CSS Per-Feature -->
  <link rel="stylesheet" href="css/tu-vi.css" />
  <link rel="stylesheet" href="css/van-khan.css" />
  <link rel="stylesheet" href="css/tu-tru.css" />
  <link rel="stylesheet" href="css/lich-am.css" />

  <!-- Print CSS -->
  <link rel="stylesheet" href="css/print.css" media="print" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">☯</span>
        <div class="brand-text">
          <h1 class="brand-title">Lịch Việt Nam 888</h1>
          <p class="brand-sub">Tra cứu lịch âm dương &amp; thuật số phương Đông</p>
        </div>
        <span class="brand-icon brand-icon-right">🌸</span>
      </div>

      <!-- Thanh thông tin ngày hôm nay -->
      <div class="header-today" id="header-today">
        <span id="today-solar"></span>
      </div>
    </div>
  </header>

  <!-- ===== NAVIGATION ===== -->
  <nav class="main-nav" id="main-nav">
    <div class="nav-inner">
      <button class="nav-tab" data-section="lich-am" onclick="loadSection('lich-am')">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Lịch Âm</span>
      </button>
      <button class="nav-tab" data-section="tu-vi" onclick="loadSection('tu-vi')">
        <span class="tab-icon">⭐</span>
        <span class="tab-label">Tử Vi</span>
      </button>
      <button class="nav-tab" data-section="tu-tru" onclick="loadSection('tu-tru')">
        <span class="tab-icon">🔮</span>
        <span class="tab-label">Tứ Trụ</span>
      </button>
      <button class="nav-tab" data-section="phong-thuy" onclick="loadSection('phong-thuy')">
        <span class="tab-icon">🧭</span>
        <span class="tab-label">Phong Thủy</span>
      </button>
      <button class="nav-tab active" data-section="van-khan" onclick="loadSection('van-khan')">
        <span class="tab-icon">🙏</span>
        <span class="tab-label">Văn Khấn</span>
      </button>
    </div>
  </nav>

  <!-- ===== APP CONTAINER ===== -->
  <main id="app" class="app-container">
    <div class="app-loading" id="app-loading">
      <div class="loading-spinner"></div>
      <p>Đang tải...</p>
    </div>
  </main>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>🌸 Lịch Việt Nam 888 &copy; 2024 &nbsp;|&nbsp; Kết hợp truyền thống &amp; hiện đại &nbsp;|&nbsp; Powered by Gemini AI</p>
      <p class="footer-note">Thông tin mang tính tham khảo, không thay thế tư vấn chuyên gia.</p>
    </div>
  </footer>

  <!-- ===== JAVASCRIPT ===== -->
  <!-- Config -->
  <script src="js/config.js"></script>

  <!-- AI Service -->
  <script src="js/ai-service.js"></script>

  <!-- Data -->
  <script src="js/data/van-khan-data.js"></script>
  <script src="js/data/can-chi.js"></script>
  <script src="js/data/tiet-khi.js"></script>
  <script src="js/data/sao-tu-vi.js"></script>

  <!-- Engines -->
  <script src="js/engines/tu-vi-engine.js"></script>
  <script src="js/engines/lunar-engine.js"></script>
  <script src="js/engines/can-chi-engine.js"></script>
  <script src="js/engines/bat-tu-engine.js"></script>

  <!-- App Router (phải load trước UI modules) -->
  <script src="js/app.js"></script>

  <!-- UI Modules -->
  <script src="js/ui/van-khan-ui.js"></script>
  <script src="js/ui/tu-vi-ui.js"></script>
  <script src="js/ui/tu-tru-ui.js"></script>
  <script src="js/ui/lich-am-ui.js"></script>

  <!-- AI Modules -->
  <script src="js/ai/van-khan-ai.js"></script>
  <script src="js/ai/tu-vi-ai.js"></script>
  <script src="js/ai/tu-tru-ai.js"></script>
  <script src="js/ai/lich-am-ai.js"></script>

</body>
</html>
