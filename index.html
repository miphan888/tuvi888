<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra Cứu Văn Khấn Việt Nam — Danh Mục</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo-link">
      <div class="logo-symbol">☸</div>
      <div class="logo-text">
        <h1>Văn Khấn Việt</h1>
        <p>Tra cứu &amp; In văn khấn truyền thống</p>
      </div>
    </a>
    <nav class="header-nav">
      <a href="index.html">Danh mục</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h2>📜 Kho Văn Khấn Truyền Thống Việt Nam</h2>
  <p>Tra cứu hơn 24 bài văn khấn chính thống — điền thông tin, xem trước và in ngay</p>
</section>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Tìm bài văn khấn... (VD: giỗ, khai trương, thôi nôi...)">
  </div>
</div>

<div class="container">
  <p class="section-title">Danh mục</p>
  <div class="category-grid" id="cat-grid"></div>

  <p class="section-title">Các bài văn khấn</p>
  <div class="card-grid" id="card-grid"></div>
</div>

<script src="js/van-khan-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
