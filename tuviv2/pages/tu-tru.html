<section id="sect-tu-tru">
  <div class="grid-2" style="margin-bottom:20px">
    <!-- FORM NHẬP -->
    <div class="card">
      <div class="card-title">🏮 Phân Tích Tứ Trụ Bát Tự</div>
      <div class="form-row">
        <div class="form-group">
          <label>Họ Tên</label>
          <input type="text" id="batu-ten" placeholder="Nhập họ tên...">
        </div>
        <div class="form-group" style="flex:0.5">
          <label>Giới Tính</label>
          <div class="radio-group">
            <label><input type="radio" name="batu-gt" value="nam" checked> Nam</label>
            <label><input type="radio" name="batu-gt" value="nu"> Nữ</label>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Ngày</label><input type="number" id="batu-day" min="1" max="31" placeholder="DD"></div>
        <div class="form-group"><label>Tháng</label><input type="number" id="batu-month" min="1" max="12" placeholder="MM"></div>
        <div class="form-group"><label>Năm</label><input type="number" id="batu-year" min="1900" max="2100" placeholder="YYYY"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Giờ Sinh</label>
          <select id="batu-gio">
            <option value="-1">— Không biết —</option>
            <option value="0">Tý (23:00-01:00)</option>
            <option value="1">Sửu (01:00-03:00)</option>
            <option value="2">Dần (03:00-05:00)</option>
            <option value="3">Mão (05:00-07:00)</option>
            <option value="4">Thìn (07:00-09:00)</option>
            <option value="5">Tỵ (09:00-11:00)</option>
            <option value="6">Ngọ (11:00-13:00)</option>
            <option value="7">Mùi (13:00-15:00)</option>
            <option value="8">Thân (15:00-17:00)</option>
            <option value="9">Dậu (17:00-19:00)</option>
            <option value="10">Tuất (19:00-21:00)</option>
            <option value="11">Hợi (21:00-23:00)</option>
          </select>
        </div>
        <div class="form-group" style="flex:0.5">
          <label>Múi Giờ</label>
          <select id="batu-tz">
            <option value="7" selected>UTC+7</option>
            <option value="8">UTC+8</option>
          </select>
        </div>
      </div>
      <button class="btn" onclick="tuTruPhanTich()">🏮 Phân Tích Tứ Trụ</button>
    </div>

    <!-- KẾT QUẢ 4 TRỤ -->
    <div class="card" id="batu-result" style="display:none">
      <div class="card-title">Bát Tự — <span id="batu-ho-ten"></span></div>
      <div id="batu-4tru"></div>
      <hr class="divider">
      <div id="batu-thap-than"></div>
    </div>
  </div>

  <!-- TABS PHÂN TÍCH -->
  <div id="batu-tabs" style="display:none">
    <div class="sub-tabs">
      <div class="sub-tab active" onclick="tuTruTab('nguhanh')">Ngũ Hành</div>
      <div class="sub-tab" onclick="tuTruTab('thanvuong')">Thân Vượng/Nhược</div>
      <div class="sub-tab" onclick="tuTruTab('dungthan')">Dụng Thần</div>
      <div class="sub-tab" onclick="tuTruTab('ailuan')">🤖 AI Luận Đoán</div>
    </div>

    <div id="tab-nguhanh">
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Phân Bố Ngũ Hành</div>
          <div id="batu-hanh-bars"></div>
          <div id="batu-hanh-nhanxet" style="margin-top:12px"></div>
        </div>
        <div class="card">
          <div class="card-title">Tương Sinh · Tương Khắc</div>
          <div id="batu-sinh-khac"></div>
        </div>
      </div>
    </div>

    <div id="tab-thanvuong" style="display:none">
      <div class="card">
        <div class="card-title">Phân Tích Nhật Chủ</div>
        <div id="batu-than-vuong"></div>
      </div>
    </div>

    <div id="tab-dungthan" style="display:none">
      <div class="card">
        <div class="card-title">Dụng Thần · Hỷ Thần · Kỵ Thần</div>
        <div id="batu-dung-than"></div>
      </div>
      <div class="card mt-4">
        <div class="card-title">💡 Lời Khuyên Phong Thủy</div>
        <div id="batu-loi-khuyen"></div>
      </div>
    </div>

    <div id="tab-ailuan" style="display:none">
      <div class="card">
        <div class="card-title">🤖 AI Luận Đoán Chuyên Sâu</div>
        <p style="font-size:13px;color:var(--ink3);margin-bottom:14px">Bổ sung cho kết quả phân tích cục bộ phía trên</p>
        <button class="btn" onclick="tuTruGoiAI()">🤖 Gọi AI Luận Đoán</button>
        <div id="batu-ai-loading" style="display:none;padding:20px;text-align:center">
          <div class="loading-spinner" style="width:36px;height:36px;margin:0 auto 12px"></div>
          <p style="color:var(--gold)">AI đang phân tích...</p>
        </div>
        <div id="batu-ai-result" style="display:none;margin-top:16px"></div>
      </div>
    </div>
  </div>
</section>
